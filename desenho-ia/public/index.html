<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprende a Desenhar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <h1>🎨 Aprende a Desenhar</h1>
 
  <!-- LOADING -->
  <div id="loading" style="display:none;">
    <span>⏳</span>
    A processar...
  </div>
 
  <!-- PASSO 1 — Fotografar o sujeito -->
  <div id="passo1" class="passo">
    <h2>Passo 1 — Fotografa o sujeito</h2>
    <video id="video" autoplay muted playsinline></video>
 
    <div class="botoes-camera">
      <!-- Ligar/desligar — aparece sempre -->
      <button id="btn-toggle" onclick="toggleCamera()" class="btn-secundario">
        📷 Desligar câmara
      </button>
      <!-- Trocar câmara — só aparece se houver 2+ câmaras -->
      <button id="btn-trocar" onclick="trocarCamera()" class="btn-secundario" style="display:none;">
        🔄 Trocar câmara
      </button>
    </div>
 
    <button id="btn-capturar" onclick="capturarSujeito()">📸 Capturar Foto</button>
  </div>
 
  <!-- PASSO 2 — Mostrar esboço -->
  <div id="passo2" class="passo" style="display:none;">
    <h2>Passo 2 — O teu esboço de referência</h2>
    <div id="foto-referencia"></div>
    <p id="esboco-texto"></p>
    <button onclick="passarParaPasso3()">✏️ Já desenhei!</button>
  </div>
 
  <!-- PASSO 3 — Fotografar o desenho -->
  <div id="passo3" class="passo" style="display:none;">
    <h2>Passo 3 — Fotografa o teu desenho</h2>
    <video id="video2" autoplay muted playsinline></video>
    <button onclick="capturarDesenho()">📸 Capturar Desenho</button>
  </div>
 
  <!-- RESULTADO -->
  <div id="resultado" class="passo" style="display:none;">
    <h2>Resultado ✨</h2>
    <p id="feedback-texto"></p>
    <button onclick="recomecar()">🔄 Recomeçar</button>
  </div>
 
  <script src="app.js"></script>
</body>
</html>
